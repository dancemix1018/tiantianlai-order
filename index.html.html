*{box-sizing:border-box;margin:0;padding:0}
:root{

.join-input{width:100%;padding:10px 12px;border:1.5px solid rgba(107,58,31,.3);border-radius:3px;font-size:16px;background:var(--bg);color:var(--brown);font-family:'Noto Sans TC',sans-serif;outline:none;text-align:center;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.join-input:focus{border-color:var(--orange)}

<script>
/* ══════════════════════════════════════
   Firebase Realtime Database 設定
══════════════════════════════════════ */
const DB_URL = 'https://tiantianlai-order-default-rtdb.asia-southeast1.firebasedatabase.app';

/* ── Firebase REST API 封裝 ── */
async function dbGet(path){
  const r = await fetch(`${DB_URL}/${path}.json`);
  return r.ok ? r.json() : null;
}
async function dbSet(path, data){
  await fetch(`${DB_URL}/${path}.json`, {method:'PUT', body:JSON.stringify(data)});
}
async function dbPush(path, data){
  const r = await fetch(`${DB_URL}/${path}.json`, {method:'POST', body:JSON.stringify(data)});
  return r.ok ? (await r.json()).name : null;
}
async function dbDelete(path){
  await fetch(`${DB_URL}/${path}.json`, {method:'DELETE'});
}

/* Server-Sent Events 即時監聽 */
let sseSource = null;
function listenPath(path, cb){
  if(sseSource){ sseSource.close(); sseSource=null; }
  sseSource = new EventSource(`${DB_URL}/${path}.json`);
  sseSource.addEventListener('put', e => {
    try{ cb(JSON.parse(e.data)); }catch(err){}
  });
  sseSource.addEventListener('patch', e => {
    try{ cb(JSON.parse(e.data)); }catch(err){}
  });
}

/* ══════════════════════════════════════
   SVG LOGO
══════════════════════════════════════ */
const LOGO_SVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

</svg>`;

/* ══════════════════════════════════════
   菜單資料
══════════════════════════════════════ */
const MENU = [
  {id:'m1',e:'🍚',n:'經典海南雞飯',en:'Classic Hainan Chicken Rice',
   d:'鎮店招牌飯・使用國產溫體雞三溫暖熬煮\n配上經典薑蔥醬　一碗就是答案',p:145,c:'主餐'},
  {id:'m2',e:'🥩',n:'泰式烤霸降豬',en:'Thai Grilled Marbled Pork Rice',
   d:'沉境式體驗芒提雅的夜\n鮮嫩嫩口的霸降肉，配上傳統泰式醬料\n最後火烤就是美味',p:160,c:'主餐'},
  {id:'m3',e:'🌶',n:'泰市場打拋豬',en:'Thai Chili Pork Rice',
   d:'一秒回到泰國街頭！\n爆炒豬肉三肥七瘦，配上經典黑醬油\n人生苦短再來一碗',p:135,c:'主餐'},
  {id:'d1',e:'👑',n:'經典雙拼',en:'Hainan Chicken With Thai Chili Pork',d:'海南雞＋打拋豬',p:165,c:'雙拼'},
  {id:'d2',e:'👑',n:'泰泰雙拼',en:'Grilled Marbled Pork With Thai Chili Pork',d:'霸降豬＋打拋豬',p:170,c:'雙拼'},

  {id:'s3',e:'🍳',n:'雞魯飯',       en:'Chicken Braised Pork',            d:'',p:50, c:'小菜'},
  {id:'s4',e:'🍗',n:'單點麻香炸雞', en:'Thai-Style Spicy Fried Chicken',  d:'',p:100,c:'小菜'},

];
const CATS = ['主餐','雙拼','小菜','飲料'];
const CAT_META = {
  '主餐':{label:'主　餐',en:'Main Dish',icon:'🍽'},
  '雙拼':{label:'滿足雙拼',en:'Double Main Dish',icon:'👑'},
  '小菜':{label:'其他小菜',en:'Side Dish',icon:'🥗'},
  '飲料':{label:'解渴一下',en:'Drinks',icon:'🧋'},
};

/* ══════════════════════════════════════
   APP STATE
══════════════════════════════════════ */
let st = {
  screen: 'setup',   // setup | order | summary
  roomId: null,
  isHost: false,
  name: '', note: '',
  qty: {},
  orders: {},        // key→order object (from Firebase)
  toast: '', toastType: 'ok',
  loading: false,
  myOrderKey: null,
};

/* 從 URL hash 讀取 roomId */
function getRoomFromHash(){
  const h = location.hash.replace('#','').trim().toUpperCase();
  return h.length === 6 ? h : null;
}
function setHashRoom(id){
  location.hash = id;
}

/* 6碼房間 ID */
function genRoomId(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = '';
  for(let i=0;i<6;i++) id += chars[Math.floor(Math.random()*chars.length)];
  return id;
}

/* 初始化：若 URL 帶有 hash room 則直接進點餐頁 */
(function init(){
  const rid = getRoomFromHash();
  if(rid){
    st.roomId = rid;
    st.screen = 'order';
    st.isHost = false;
    startListening();
  }
})();

/* ══════════════════════════════════════
   Firebase 操作
══════════════════════════════════════ */
function startListening(){
  listenPath(`rooms/${st.roomId}/orders`, data => {
    st.orders = data || {};
    if(st.screen === 'summary' || st.screen === 'order') render();
  });
}

async function createRoom(){
  st.loading = true; render();
  const rid = genRoomId();
  await dbSet(`rooms/${rid}`, {created: Date.now(), orders: {}});
  st.roomId = rid;
  st.isHost = true;
  st.screen = 'summary';
  setHashRoom(rid);
  startListening();
  st.loading = false;
  showToast(`收單室已建立！房間代碼：${rid}`, 'ok');
  render();
}

async function joinRoom(rid){
  st.loading = true; render();
  rid = rid.trim().toUpperCase();
  if(rid.length !== 6){ showToast('請輸入正確的 6 碼代碼','err'); st.loading=false; render(); return; }
  const data = await dbGet(`rooms/${rid}`);
  if(!data){ showToast('找不到此房間，請確認代碼','err'); st.loading=false; render(); return; }
  st.roomId = rid;
  st.isHost = false;
  st.screen = 'order';
  setHashRoom(rid);
  startListening();
  st.loading = false;
  render();
}

async function submitOrder(){
  if(!st.name.trim() || !cnt()) return;
  const items = MENU.filter(m=>(st.qty[m.id]||0)>0).map(m=>({n:m.n,qty:st.qty[m.id],p:m.p}));
  const order = {
    name: st.name.trim(),
    note: st.note.trim(),
    items,
    total: tot(),
    time: Date.now()
  };
  st.loading = true; render();
  const key = await dbPush(`rooms/${st.roomId}/orders`, order);
  st.myOrderKey = key;
  st.qty = {}; st.name = ''; st.note = '';
  st.screen = 'summary';
  st.loading = false;
  showToast('訂單已送出！', 'ok');
  render();
}

async function removeOrder(key){
  await dbDelete(`rooms/${st.roomId}/orders/${key}`);
}

async function clearAllOrders(){
  if(!confirm('確定清除所有訂單？此動作無法復原。')) return;
  await dbSet(`rooms/${st.roomId}/orders`, {});
}

/* ══════════════════════════════════════
   工具函式
══════════════════════════════════════ */
const tot = () => MENU.reduce((s,m)=>s+(st.qty[m.id]||0)*m.p, 0);
const cnt = () => MENU.reduce((s,m)=>s+(st.qty[m.id]||0), 0);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const nl2br = s => esc(s).replace(/\n/g,'<br>');
const ini = n => n ? n.charAt(0).toUpperCase() : '?';

function showToast(msg, type='ok'){
  st.toast = msg; st.toastType = type;
  setTimeout(()=>{ st.toast=''; render(); }, 3500);
}

function getOrderList(){
  if(!st.orders) return [];
  return Object.entries(st.orders)
    .filter(([k,v])=>v && v.name)
    .sort((a,b)=>(a[1].time||0)-(b[1].time||0));
}

function fmtTxt(){
  const list = getOrderList();
  let L = ['╔══════════════════════╗','║  天天來海南雞・辦公室訂單  ║','╚══════════════════════╝','',`房間代碼：${st.roomId}`,''];
  let g = 0;
  list.forEach(([k,o],i)=>{
    L.push(`${i+1}.【${o.name}】`);
    (o.items||[]).forEach(it=>L.push(`   ${it.n} ×${it.qty}　NT$${it.p*it.qty}`));
    if(o.note) L.push(`   ⚠ 備註：${o.note}`);
    L.push(`   小計 NT$${o.total}`);
    g+=o.total; L.push('');
  });
  L.push('──────────────────────');
  L.push(`共 ${list.length} 人・合計 NT$${g}`);
  L.push('天天來海南雞　用心做雞 🐔');
  return L.join('\n');
}

function copyRoomLink(){
  const url = `${location.origin}${location.pathname}#${st.roomId}`;
  navigator.clipboard.writeText(url).then(()=>showToast('已複製連結！分享給同仁即可開始點餐','ok'))
    .catch(()=>{ prompt('複製此連結分享給同仁：', url); });
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render(){
  const el = document.getElementById('root');
  const orderList = getOrderList();
  const oc = orderList.length;
  const gd = orderList.reduce((s,[k,o])=>s+(o.total||0), 0);
  let h = '';

  /* HEADER */
  h += `<div class="header">
    <div class="stripe-top"></div>
    <div class="header-body">
      <div class="logo-wrap">${LOGO_SVG}</div>
      <div class="header-text">
        <div class="h-brand">天天來海南雞</div>
        <div class="h-en">TIANTIAN LAI · HAINANESE CHICKEN RICE</div>
      </div>
      <div class="h-tag">用心做雞</div>
    </div>
    <div class="stripe-btm"></div>
  </div>`;

  /* 房間資訊欄（有房間時顯示） */
  if(st.roomId){
    h += `<div class="room-bar">
      <span class="live-dot"></span>
      <span class="live-label">即時同步・房間代碼</span>
      <span class="room-id">${st.roomId}</span>
      <button class="room-copy" onclick="copyRoomLink()">📎 複製連結</button>
    </div>`;
  }

  /* TABS（有房間時顯示） */
  if(st.roomId){
    h += `<div class="tabs">
      <button class="tab ${st.screen==='order'?'on':''}" onclick="st.screen='order';render()">🍽 我要點餐</button>
      <button class="tab ${st.screen==='summary'?'on':''}" onclick="st.screen='summary';render()">📋 收單總覽${oc>0?`<span class="badge">${oc}</span>`:''}</button>
    </div>`;
  }

  h += `<div class="content">`;
  if(st.toast) h += `<div class="toast ${st.toastType}">✓ ${esc(st.toast)}</div>`;
  if(st.loading){
    h += `<div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>`;
    h += `</div>`; el.innerHTML = h; return;
  }

  /* ── 設定畫面 ── */
  if(st.screen === 'setup'){
    h += `<div class="room-setup">
      <div class="room-setup-title">開始收單</div>
      <div class="room-setup-sub">建立一個收單室，把連結分享給同仁<br>所有人的訂單將即時同步，方便你一次傳給店家</div>
      <div class="room-setup-btns">
        <button class="btn-primary" onclick="createRoom()">＋ 建立收單室</button>
      </div>
    </div>
    <div class="room-setup" style="margin-top:12px">
      <div class="room-setup-title" style="font-size:14px">已有連結？直接加入</div>
      <input class="join-input" id="join-code" type="text" placeholder="輸入 6 碼代碼" maxlength="6">
      <button class="btn-secondary" style="width:100%" onclick="joinRoom(document.getElementById('join-code').value)">加入點餐</button>
    </div>`;

  /* ── 點餐畫面 ── */
  } else if(st.screen === 'order'){
    h += `<div class="input-box">
      <div class="ilbl">你的姓名 <span class="req">*</span></div>
      <input class="inp" type="text" placeholder="請輸入姓名（例如：小明）" value="${esc(st.name)}" oninput="st.name=this.value;render()" maxlength="20">
      <textarea class="txta" placeholder="備註：辣度・忌口・特殊需求（可不填）" rows="2" oninput="st.note=this.value;render()">${esc(st.note)}</textarea>
    </div>`;

    CATS.forEach(c=>{
      const items = MENU.filter(m=>m.c===c);
      const meta = CAT_META[c];
      h += `<div class="sec-hd">
        <div class="sec-line"></div>
        <div class="sec-inner">${meta.icon} ${meta.label} <span style="opacity:.7;font-weight:400;font-size:9.5px;letter-spacing:.08em">${meta.en}</span></div>
        <div class="sec-line"></div>
      </div>`;
      items.forEach(m=>{
        const q = st.qty[m.id]||0;
        h += `<div class="mcard ${q>0?'sel':''}">
          <div class="mcard-emoji">${m.e}</div>
          <div class="mcard-info">
            <div class="mcard-name">${m.n}</div>
            <div class="mcard-en">${m.en}</div>
            ${m.d?`<div class="mcard-desc">${nl2br(m.d)}</div>`:''}
            <div class="mcard-price">NT$ ${m.p}</div>
          </div>
          <div class="qty">
            <button class="qbtn ${q===0?'z':''}" onclick="st.qty['${m.id}']=Math.max(0,(st.qty['${m.id}']||0)-1);render()">−</button>
            <span class="qnum">${q}</span>
            <button class="qbtn" onclick="st.qty['${m.id}']=(st.qty['${m.id}']||0)+1;render()">＋</button>
          </div>
        </div>`;
      });
    });

    const t=tot(), k=cnt();
    if(k>0) h += `<div class="sumbar"><span class="suml">已選 ${k} 項餐點</span><span class="sumr">NT$ ${t}</span></div>`;
    const ok = st.name.trim() && k>0;
    h += `<button class="sub-btn" onclick="submitOrder()" ${!ok?'disabled':''}>
      ${!st.name.trim()?'請先輸入姓名':k===0?'請選擇至少一項餐點':'確認送出訂單　NT$ '+t}
    </button>`;

  /* ── 收單總覽 ── */
  } else if(st.screen === 'summary'){
    if(!oc){
      h += `<div class="empty">
        <div class="empty-ico">🍚</div>
        <div class="empty-t">等待同仁點餐中…</div>
        <div class="empty-s">將連結分享給同仁，訂單將即時出現在這裡</div>
      </div>`;
      h += `<button class="copy-btn" onclick="copyRoomLink()">📎 複製點餐連結（分享給同仁）</button>`;
    } else {
      const totalDishes = orderList.reduce((s,[k,o])=>s+(o.items||[]).reduce((a,i)=>a+i.qty,0),0);
      h += `<div class="grand">
        <div>
          <div class="grand-lbl"><span class="live-dot"></span>即時同步中</div>
          <div class="grand-amt">NT$ ${gd}</div>
          <div class="grand-cnt">共 ${oc} 人 · ${totalDishes} 份餐點</div>
        </div>
        <div class="grand-logo">${LOGO_SVG}</div>
      </div>`;
      h += `<button class="copy-btn" onclick="cpyOrder()">📋 複製完整訂單（傳給店家）</button>`;
      h += `<button class="copy-btn" style="background:rgba(107,58,31,.12);color:var(--brown-mid);border-bottom-color:transparent;margin-bottom:12px" onclick="copyRoomLink()">📎 繼續分享點餐連結</button>`;
      h += `<div class="divider"><div class="div-line"></div><div class="div-dot"></div><div class="div-line"></div></div>`;

      orderList.forEach(([key,o])=>{
        h += `<div class="ocard">
          <div class="ohead">
            <div class="operson"><div class="pav">${ini(o.name)}</div>${esc(o.name)}</div>
            <div class="ototal">NT$ ${o.total}</div>
          </div>`;
        (o.items||[]).forEach(it=>h+=`<div class="orow"><span>${esc(it.n)} ×${it.qty}</span><span>NT$ ${it.p*it.qty}</span></div>`);
        if(o.note) h+=`<div class="onote">📝 備註：${esc(o.note)}</div>`;
        h+=`<button class="rmbtn" onclick="removeOrder('${key}')">✕ 移除此筆</button></div>`;
      });
      h += `<button class="clr-btn" onclick="clearAllOrders()">清除所有訂單（重新開始收單）</button>`;
    }
  }

  h += `</div><div class="footer">天天來海南雞飯有限公司 · EST. 2023 · 用心做雞</div>`;
  el.innerHTML = h;
}

function cpyOrder(){
  navigator.clipboard.writeText(fmtTxt()).then(()=>showToast('已複製！直接貼到 LINE 傳給店家即可','ok'))
    .catch(()=>prompt('複製以下內容：', fmtTxt()));
}

render();
</script>
</body>
</html>
